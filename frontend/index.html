<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0">

<title>AGRI MBSB</title>

<link
rel="stylesheet"
href="./styles/style.css">

</head>

<body>

<div class="container">

<h1>

AGRI MBSB WORK RECORD SYSTEM

</h1>



<!-- TOP BAR -->

<div class="topbar">

<button id="openDialogBtn">

+ ADD RECORD

</button>


<input
type="month"
id="monthFilter">


<button id="clearFilterBtn">

CLEAR

</button>


<button id="exportBtn">

EXPORT EXCEL

</button>

</div>


<!-- DASHBOARD -->

<div class="card">

<h2>

DATABASE RECORDS

</h2>
   <div class="table-wrapper">
		<table
		id="dashboardTable">

		<thead>

		<tr>

		<th>DATE</th>

		<th>WORK</th>

		<th>BLOCK</th>

		<th>QTY</th>

		<th>UNIT</th>

		<th>UNIT PRICE</th>

		<th>BY PERSON</th>

		<th>ACTION</th>

		</tr>

		</thead>

		<tbody
		id="dashboardBody">

		</tbody>

		</table>

	</div>
</div>
<div
    id="pagination"
    class="pagination">
</div>

<!-- ADD RECORD MODAL -->

<div
id="inputModal"
class="modal hidden">

<div
class="modal-content modal-large">

    <!-- HEADER -->

    <div class="modal-header">

        <h2>
            ADD WORK RECORD
        </h2>

        <button
        id="closeDialogBtn">

            ✕

        </button>

    </div>

    <!-- BODY -->

    <!-- BODY -->

<div class="modal-body">

    <table id="inputTable">

        <thead>

            <tr>

                <th>DATE *</th>

                <th>WORK *</th>

                <th>BLOCK</th>

                <th>QTY</th>

                <th>UNIT</th>

                <th>UNIT PRICE</th>

                <th>TOTAL</th>

                <th>BY PERSON *</th>

                <th>ACTION</th>

            </tr>

        </thead>

        <tbody id="inputBody">

        </tbody>

    </table>

</div>

    <!-- FOOTER -->

    <div class="modal-footer">

        <button
        id="addRowBtn">

            + ADD ROW

        </button>

        <button
        id="saveAllBtn">

            SAVE ALL

        </button>

    </div>

</div>

</div>



<!-- EDIT MODAL -->

<div
id="editModal"
class="modal hidden">

    <div
    class="modal-content edit-modal">

        <div class="modal-header">

            <h2>
                EDIT RECORD
            </h2>

        </div>

        <input
        type="hidden"
        id="editId">

        <div class="editGroup">

            <label>Date</label>

            <input
            type="date"
            id="editDate">

        </div>

        <div class="editGroup">

            <label>Work</label>

            <input
            id="editWork"
            class="modalInput"
            list="editWorkList"
            placeholder="SEARCH WORK"
            autocomplete="off">

            <datalist
            id="editWorkList">
            </datalist>

        </div>

        <div class="editGroup">

            <label>Block</label>

            <input
            type="text"
            id="editBlock"
            placeholder="BLOCK">

        </div>

        <div class="editGroup">

            <label>Qty</label>

            <input
            type="number"
            id="editQty"
            placeholder="QTY">

        </div>

        <div class="editGroup">

            <label>Unit</label>

            <input
            type="text"
            id="editWorkUnit"
            readonly
            style="
            background:#d2d3d6;
            cursor:not-allowed;
            ">

        </div>

        <div class="editGroup">

            <label>Unit Price</label>

            <input
            type="number"
            id="editUnitPrice"
            readonly
            style="
            background:#d2d3d6;
            cursor:not-allowed;
            ">

        </div>

        <div class="editGroup">

            <label>Total</label>

            <input
            type="number"
            id="editTotal"
            readonly
            style="
            background:#d2d3d6;
            cursor:not-allowed;
            ">

        </div>

        <div class="editGroup">

            <label>By Person</label>

            <input
            id="editByPerson"
            list="editWorkerList"
            placeholder="SELECT WORKER"
            autocomplete="off">

            <datalist
            id="editWorkerList">
            </datalist>

        </div>

        <div class="modal-buttons">

            <button
            id="updateBtn">

                UPDATE

            </button>

            <button
            id="closeModalBtn">

                CLOSE

            </button>

        </div>

    </div>

</div>



<!-- DATALIST -->

<datalist
id="workList">
</datalist>

<datalist
id="workerList">
</datalist>






<!-- SHEETJS -->

<script
src="https://cdn.jsdelivr.net/npm/xlsx-js-style@1.2.0/dist/xlsx.bundle.js">
</script>



<script
src="./js/app.js">

</script>
<datalist
id="workList">
</datalist>

<datalist id="workerList">

</datalist>
</body>
</html>

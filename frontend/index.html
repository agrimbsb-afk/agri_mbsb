<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<title>AGRI MBSB</title>

<link
rel="stylesheet"
href="./styles/style.css">

</head>

<body>

<h1>AGRI MBSB WORK RECORD</h1>

<form id="recordForm">

<input type="date" id="date">

<input
type="text"
id="work"
placeholder="WORK">

<input
type="text"
id="block"
placeholder="BLOCK">

<input
type="number"
id="ha"
placeholder="HA">

<input
type="number"
id="bag"
placeholder="BAG">

<input
type="number"
id="acre"
placeholder="ACRE">

<input
type="number"
id="unit_price"
placeholder="UNIT PRICE">

<input
type="number"
id="total"
placeholder="TOTAL">

<input
type="text"
id="by_person"
placeholder="BY">

<button type="submit">

SAVE

</button>

</form>

<table>

<thead>

<tr>

<th>DATE</th>
<th>WORK</th>
<th>BLOCK</th>
<th>HA</th>
<th>BAG</th>
<th>TOTAL</th>
<th>BY</th>

</tr>

</thead>

<tbody id="tableBody">

</tbody>

</table>

<script src="./js/app.js"></script>

</body>
</html>

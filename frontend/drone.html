<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">


<meta
name="viewport"
content="width=device-width,initial-scale=1">

<title>Drone Record </title>

<script src="./js/config.js"></script>
<script src="../js/pageguard/tokenGuard.js"></script>
<script src="./js/pageguard/pageGuard.js"></script>
<script src="./js/pageguard/fetchGuard.js"></script>
<script src="./js/dateHelper.js"></script>

<link rel="icon" type="image/png" href="./icon/mbsb_drone.png">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"> 
<link rel="stylesheet" href="./styles/variables.css">
<link rel="stylesheet" href="./styles/base.css">
<link rel="stylesheet" href="./styles/layout.css">
<link rel="stylesheet" href="./styles/components.css">
<link rel="stylesheet" href="./styles/style.css">
<link rel="stylesheet" href="./styles/drone/drone.css">
</head>

<body>

<div class="container">

	<div class="page-header">

		<div class="page-header-left">

			<div class="system-title">
				 <i class="fa-solid fa-plane"></i>
				
				DRONE RECORD
			</div>

			<div class="system-subtitle">

				Welcome back,

				<span id="loginUser">
					USER
				</span>
				
				<span class="header-divider">|</span>
				
				<span id="todayDate"></span>

           

			</div>

		</div>

		<div class="page-header-right">

			<button id="logoutBtn" class="btn btn-danger">
				<i class="fa-solid fa-right-from-bracket"></i>
			</button>

		</div>

	</div>

	<div class="card">

		<div class="topbar">

		<input
		id="workDate"
		type="date">

		<div class="custom-select">

			<div class="search-dropdown">

				<input
				type="text"
				id="searchWork"
				placeholder="Select Work">

				<div
				id="workDropdown"
				class="dropdown-list">
				</div>

			</div>

		</div>
		
	<div id="flowhaWrapper">
		<input
		id="flowha"
		placeholder="L/HA">
	</div>
		<input
		id="block"
		placeholder="Block">

		<input
		id="workArea"
		placeholder="Work Area">

		<input
		id="areaha"
		type="number"
		placeholder="Area (HA)">



		<button
		id="addBtn" class="btn btn-success">

		+ ADD

		</button>

		</div>

		<div class="table-container">
			<table>

			<thead>

			<tr>

			<!-- <th>Date</th> -->
			<th>Work</th>
            <th>Block</th>
            <th>Work Area</th>
            <th>Area (HA)</th>
            <th>Item Used</th>
            <th>UNIT/HA</th>
            <th>CTN</th>
            <th>PCS</th>
			<th>VOL</th>
            <th>Action</th>
			</tr>

			</thead>

			<tbody id="recordTable">

			</tbody>

			</table>
			
			<div
				id="pagination"
				class="pagination">
			</div>
		</div>

		<div class="save-bar">

			<button id="whatsappBtn">

				<i class="fa-brands fa-whatsapp"></i>
				WhatsApp

			</button>

		</div>

	</div>

</div>


<!-- ADD DIALOG -->

<div id="itemDialog" class="modal hidden">

	<div class="modal-content modal-large">

		<div class="modal-header">

			<h2 id="dialogTitle">DRONE WORK</h2>

			<button id="closeDialogBtn" class="btn btn-danger">X</button>
			
		</div>

		<!-- DIALOG BODY -->
		 
		<div class="modal-body">

			<div class="table-container">

				<table class="dialog-table">

					<thead>

						<tr>

							<th>Item Used</th>
							<th>Unit/HA</th>
							<th>CTN</th>
							<th>PCS</th>
							<th>VOL (ML/G)</th>
							<th>Action</th>

						</tr>

					</thead>

					<tbody id="dialogTableBody"></tbody>

				</table>
				
			</div>

		</div>
		
		<!-- FOOTER -->
		<div class="dialog-footer">

			<button id="addDialogRowBtn" class="btn btn-success">+ ADD</button>

			<button id="dialogSaveBtn" class="btn btn-primary">SAVE</button>

		</div>

	</div>

</div>

<!-- EDIT DIALOG -->

<div id="editDialog" class="modal hidden">

	<div class="modal-content">

		<div class="modal-header">

			<h2>EDIT DRONE RECORD</h2>

			<button id="closeEditDialogBtn" class="btn btn-danger" >X</button>

		</div>

		<div class="edit-form">

			<div class="edit-row">

				<label>Date</label>

				<input id="editDate" type="date">

			</div>

			<div class="edit-row">

				<label>Work</label>
				
				<div class="custom-select">

					<div class="search-dropdown">

						<input
						type="text"
						id="editWork"
						placeholder="Select Work">

						<div
						id="editWorkDropdown"
						class="dropdown-list">
						</div>

					</div>

				</div>

			</div>

			<div class="edit-row">

				<label>L/HA</label>

				<input id="editflowha">

			</div>

			<div class="edit-row">

				<label>Block</label>

				<input id="editBlock">

			</div>

			<div class="edit-row">

				<label>Work Area</label>

				<input id="editWorkArea">

			</div>

			<div class="edit-row">

				<label>Area (HA)</label>

				<input id="editAreaHa" type="number">

			</div>

			<div class="edit-row">

				<label>Item Used</label>

				<input id="editItemUsed">

			</div>

			<div class="edit-row">

				<label>UOM</label>

				<input id="editUom">

			</div>

			<div class="edit-row">

				<label>Usage</label>

				<input id="editUsage" type="number">

			</div>

			<div class="edit-row">

				<label>Unit</label>

				<input id="editUnit">

			</div>

		</div>

		<div class="dialog-footer">

			<button id="updateBtn" class="btn btn-primary">Update</button>

		</div>

	</div>

</div>


<script src="./js/drone.js"></script>
</body>

</html>
